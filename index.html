<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICF SUP Commentator Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        body.dark-mode { background-color: #0f172a; color: #f8fafc; }
        body.dark-mode .bg-white { background-color: #1e293b; color: #f8fafc; border-color: #334155; }
        .pinned-athlete { border-left: 4px solid #f59e0b; }
    </style>
</head>
<body class="bg-gray-100 p-4 transition-colors duration-300">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-brand-900 uppercase tracking-tight">SUP Commentator Hub</h1>
            <button onclick="document.body.classList.toggle('dark-mode')" class="bg-brand-700 text-white px-3 py-1 rounded text-sm hover:bg-brand-800 transition-colors">Toggle Night Mode</button>
        </header>

        <nav class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="showPage('schedule')" class="nav-btn px-4 py-1.5 bg-brand-900 text-white rounded text-sm">Schedule</button>
            <button onclick="showPage('athletes')" class="nav-btn px-4 py-1.5 bg-brand-900 text-white rounded text-sm">Athletes</button>
            <button onclick="showPage('talk-points')" class="nav-btn px-4 py-1.5 bg-brand-900 text-white rounded text-sm">Talk Points</button>
            <button onclick="showPage('admin')" class="nav-btn px-4 py-1.5 bg-brand-900 text-white rounded text-sm">Admin</button>
        </nav>

        <div id="talk-points" class="page bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-bold mb-4 border-b pb-2">Talk Points</h2>
            <ul id="talk-points-list" class="text-sm space-y-4"></ul>
        </div>

        <div id="admin" class="page bg-white p-6 rounded-lg shadow space-y-8">
            <div class="bg-gray-50 p-5 rounded-lg border">
                <h2 class="text-lg font-bold mb-4">Import Data</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Import Sponsors CSV</label>
                        <input type="file" id="sponsor-csv" accept=".csv" class="mb-2">
                        <button onclick="importSponsorsCSV()" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm font-bold">Import Sponsors</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let talkPoints = JSON.parse(localStorage.getItem('icf_talk_points_v3')) || [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function renderTalkPoints() {
            const list = document.getElementById('talk-points-list');
            list.innerHTML = '';
            talkPoints.forEach(tp => {
                list.innerHTML += `<li class="border-b pb-2"><strong>${tp.title}</strong><p>${tp.content}</p></li>`;
            });
        }

        function importSponsorsCSV() {
            const fileInput = document.getElementById('sponsor-csv');
            const file = fileInput.files[0];
            if (!file) return alert("Select a CSV file.");

            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = e.target.result.split(/\r?\n/);
                rows.forEach(row => {
                    if (!row.includes(':')) return;
                    const parts = row.split(':');
                    const title = parts[0].replace(/[^a-zA-Z0-9 ]/g, '').trim();
                    const content = parts.slice(1).join(':').trim();
                    if(title && content) {
                        talkPoints.push({ id: Date.now() + Math.random(), title, content, category: 'Sponsors' });
                    }
                });
                localStorage.setItem('icf_talk_points_v3', JSON.stringify(talkPoints));
                renderTalkPoints();
                alert("Sponsors imported!");
            };
            reader.readAsText(file);
        }

        document.addEventListener("DOMContentLoaded", renderTalkPoints);
    </script>
</body>
</html>
