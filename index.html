<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICF SUP World Cup Commentator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#0284c7' } } }
        }
    </script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        body { transition: background-color 0.3s, color 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen pb-10">

    <div class="sticky top-0 z-50 bg-white dark:bg-slate-800 shadow-md border-b border-slate-200 dark:border-slate-700">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-microphone-lines text-brand text-xl"></i>
                <h1 class="text-lg font-black tracking-tight uppercase">SUP Comm Hub</h1>
            </div>
            <button onclick="toggleTheme()" class="px-3 py-1.5 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded-md text-sm font-bold flex items-center gap-2 transition">
                <i class="fa-solid fa-circle-half-stroke"></i> Contrast
            </button>
        </div>

        <nav class="max-w-4xl mx-auto px-4 py-2 flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="showTab('schedule')" id="btn-schedule" class="tab-btn active px-4 py-2 rounded-lg text-sm font-bold bg-brand text-white shadow">Schedule</button>
            <button onclick="showTab('athletes')" id="btn-athletes" class="tab-btn px-4 py-2 rounded-lg text-sm font-bold bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-300 dark:hover:bg-slate-600">Athletes</button>
            <button onclick="showTab('notes')" id="btn-notes" class="tab-btn px-4 py-2 rounded-lg text-sm font-bold bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-300 dark:hover:bg-slate-600">Scratchpad</button>
            <button onclick="showTab('location')" id="btn-location" class="tab-btn px-4 py-2 rounded-lg text-sm font-bold bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-300 dark:hover:bg-slate-600">Talking Points</button>
            <button onclick="showTab('admin')" id="btn-admin" class="tab-btn px-4 py-2 rounded-lg text-sm font-bold bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-300 dark:hover:bg-slate-600">Admin</button>
        </nav>
    </div>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <div id="schedule" class="tab-content active space-y-4">
            <h2 class="text-xl font-black uppercase border-b-2 border-slate-200 dark:border-slate-700 pb-2 mb-4">Event Progression</h2>
            <div id="schedule-container" class="space-y-4"></div>
        </div>

        <div id="athletes" class="tab-content">
            <h2 class="text-xl font-black uppercase border-b-2 border-slate-200 dark:border-slate-700 pb-2 mb-4">Competitor Index</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="athlete-container"></div>
        </div>

        <div id="notes" class="tab-content">
            <h2 class="text-xl font-black uppercase border-b-2 border-slate-200 dark:border-slate-700 pb-2 mb-4">Scratchpad</h2>
            <textarea id="scratchpad" class="w-full h-96 p-4 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 font-mono text-sm"></textarea>
        </div>

        <div id="location" class="tab-content">
            <h2 class="text-xl font-black uppercase border-b-2 border-slate-200 dark:border-slate-700 pb-2 mb-4">Broadcast Talking Points</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="talk-points-container"></div>
        </div>

        <div id="admin" class="tab-content">
            <h2 class="text-xl font-black uppercase border-b-2 border-slate-200 dark:border-slate-700 pb-2 mb-4">Data Import</h2>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                <label class="block text-sm font-bold mb-2">Import Sponsors CSV</label>
                <input type="file" id="sponsor-csv" accept=".csv" class="mb-4">
                <button onclick="importSponsorsCSV()" class="bg-emerald-600 text-white px-4 py-2 rounded font-bold hover:bg-emerald-700">Import Sponsors CSV</button>
            </div>
        </div>
    </main>

    <script>
        let talkPoints = JSON.parse(localStorage.getItem('icf_talk_points_v3')) || [];
        
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('bg-brand', 'text-white', 'shadow'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById(`btn-${tabId}`).classList.add('bg-brand', 'text-white', 'shadow');
        }

        function renderTalkPoints() {
            const container = document.getElementById('talk-points-container');
            container.innerHTML = talkPoints.map(tp => `
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 border-t-4 border-t-amber-500">
                    <h3 class="font-bold mb-2">${tp.title}</h3>
                    <p class="text-sm opacity-90">${tp.content}</p>
                </div>
            `).join('');
        }

        function importSponsorsCSV() {
            const fileInput = document.getElementById('sponsor-csv');
            if (!fileInput.files[0]) return alert("Please select a file.");
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = e.target.result.split(/\r?\n/);
                rows.forEach(row => {
                    if (!row.includes(':')) return;
                    const [title, ...contentParts] = row.split(':');
                    talkPoints.push({ title: title.trim(), content: contentParts.join(':').trim() });
                });
                localStorage.setItem('icf_talk_points_v3', JSON.stringify(talkPoints));
                renderTalkPoints();
                alert("Import successful!");
            };
            reader.readAsText(fileInput.files[0]);
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        document.addEventListener('DOMContentLoaded', () => { renderTalkPoints(); });
    </script>
</body>
</html>
